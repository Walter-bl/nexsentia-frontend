name: Deploy Frontend to Hostinger VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'

jobs:
  deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_APP_DIR || '/root/nexsentia-frontend' }}

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Installing dependencies..."
            npm ci --omit=dev

            echo "==> Building application..."
            npm run build

            echo "==> Reloading PM2..."
            pm2 reload nexsentia-frontend || pm2 start ecosystem.config.js --env production

            echo "==> Deploy complete!"
            pm2 status
